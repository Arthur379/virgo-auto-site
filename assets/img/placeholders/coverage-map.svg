<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img">
  <title>Virgo Auto service coverage area — northeast Ireland</title>
  <style>
    @keyframes pulse{0%,100%{r:6;opacity:1}50%{r:14;opacity:.3}}
    .pulse1{animation:pulse 2.5s ease-in-out infinite}
    .pulse2{animation:pulse 2.5s ease-in-out infinite .6s}
    .pulse3{animation:pulse 2.5s ease-in-out infinite 1.2s}
  </style>
  <rect width="800" height="600" fill="#0A0A0B"/>
  <!-- Simplified NE Ireland coastline (Louth/Meath/Down area) -->
  <g fill="none" stroke="#F5F5F2" stroke-opacity=".2" stroke-width="1.5" stroke-linejoin="round">
    <!-- East coast outline — simplified from Meath coast up through Louth, Carlingford Lough, into Down -->
    <path d="M520 580 L530 540 535 500 540 470 548 440 555 420 560 400 565 385
             570 365 572 350 568 330 560 310 555 295 552 280
             548 260 540 240 535 225 545 210 560 200 575 185
             580 170 575 150 565 135 550 120 535 110 520 100
             500 90  480 82  460 78  445 80  430 85  420 95
             415 110 418 130 425 145 430 158 420 170
             410 185 395 195 380 200 370 210 365 225
             360 240 362 260 370 275 380 285 375 295
             365 305 350 310 340 318 335 330"/>
    <!-- Carlingford Lough inlet -->
    <path d="M430 158 L445 165 460 168 470 162 475 152" stroke-opacity=".15"/>
  </g>
  <!-- 50km radius circle around Dundalk -->
  <circle cx="420" cy="260" r="160" fill="none" stroke="#D97706" stroke-width="1" stroke-dasharray="6 3" stroke-opacity=".35"/>
  <text x="575" y="175" fill="#D97706" fill-opacity=".4" font-family="monospace" font-size="9" transform="rotate(25,575,175)">50km radius</text>
  <!-- Dundalk — centre marker with pulsing animation -->
  <circle cx="420" cy="260" r="6" fill="#D97706" class="pulse3" opacity=".15"/>
  <circle cx="420" cy="260" r="6" fill="#D97706" class="pulse2" opacity=".2"/>
  <circle cx="420" cy="260" r="6" fill="#D97706" class="pulse1" opacity=".25"/>
  <circle cx="420" cy="260" r="5" fill="#D97706"/>
  <text x="435" y="255" fill="#D97706" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="13">Dundalk</text>
  <text x="435" y="270" fill="#D97706" fill-opacity=".6" font-family="monospace" font-size="8">HQ</text>
  <!-- Town markers -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#F5F5F2" fill-opacity=".7">
    <!-- Drogheda -->
    <circle cx="460" cy="370" r="3" fill="#F5F5F2" fill-opacity=".5"/>
    <text x="472" y="374">Drogheda</text>
    <!-- Ardee -->
    <circle cx="390" cy="320" r="3" fill="#F5F5F2" fill-opacity=".5"/>
    <text x="400" y="324">Ardee</text>
    <!-- Newry -->
    <circle cx="395" cy="180" r="3" fill="#F5F5F2" fill-opacity=".5"/>
    <text x="405" y="184">Newry</text>
    <!-- Monaghan -->
    <circle cx="290" cy="195" r="3" fill="#F5F5F2" fill-opacity=".5"/>
    <text x="300" y="199">Monaghan</text>
    <!-- Navan -->
    <circle cx="380" cy="420" r="3" fill="#F5F5F2" fill-opacity=".5"/>
    <text x="390" y="424">Navan</text>
    <!-- Carlingford -->
    <circle cx="445" cy="198" r="3" fill="#F5F5F2" fill-opacity=".5"/>
    <text x="455" y="202">Carlingford</text>
  </g>
  <!-- Title -->
  <text x="40" y="45" fill="#F5F5F2" fill-opacity=".8" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="16">Service Coverage</text>
  <text x="40" y="65" fill="#F5F5F2" fill-opacity=".4" font-family="monospace" font-size="10">Northeast Ireland | 50km collection radius</text>
</svg>
